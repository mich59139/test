<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue des Articles</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Catalogue des Articles</h1>
    <div class="actions">
      <button id="login-btn" title="Token en mémoire, jamais stocké">🔐 Se connecter GitHub</button>
      <button id="save-btn" title="Commit via API Contents">💾 Enregistrer dans GitHub</button>
      <button id="export-btn" title="Exporter la vue filtrée">⤓ Exporter la vue (.csv)</button>
    </div>
  </header>

  <section class="filters">
    <label>Année
      <select id="filter-annee"><option value="">(toutes)</option></select>
    </label>
    <label>Numéro
      <select id="filter-numero"><option value="">(tous)</option></select>
    </label>
    <label>Afficher
      <select id="limit">
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="all">Tous</option>
      </select>
    </label>
    <input id="search" type="text" placeholder="Rechercher…" />
    <span id="count" class="count"></span>
    <button id="toggle-add">➕ Ajouter</button>
  </section>

  <div id="table-container"></div>

  <!-- Drawer ajout / lot -->
  <aside id="drawer" class="drawer">
    <div class="drawer-content">
      <button id="close-drawer" class="close">✖</button>
      <h2>Nouvel article</h2>
      <form id="form-article" class="form">
        <input name="Année"  placeholder="Année" list="dl-annee" required />
        <input name="Numéro" placeholder="Numéro" list="dl-numero" required />
        <input name="Titre"  placeholder="Titre" required />
        <input name="Page(s)" placeholder="Page(s)" />
        <input name="Auteur(s)" placeholder="Auteur(s)" list="dl-auteurs" />
        <input name="Ville(s)"  placeholder="Ville(s)" list="dl-villes" />
        <input name="Theme(s)" placeholder="Thème(s)" list="dl-themes" />
        <input name="Epoque"   placeholder="Période (Epoque)" list="dl-epoques" />
        <button type="submit">Ajouter au lot</button>
      </form>

      <datalist id="dl-annee"></datalist>
      <datalist id="dl-numero"></datalist>
      <datalist id="dl-auteurs"></datalist>
      <datalist id="dl-villes"></datalist>
      <datalist id="dl-themes"></datalist>
      <datalist id="dl-epoques"></datalist>

      <div class="lot-actions">
        <button id="download-batch">Télécharger le lot (.csv)</button>
        <button id="copy-batch">Copier le lot</button>
        <button id="reset-batch">Vider le lot</button>
        <span id="batch-count" class="count">0 en attente</span>
      </div>
      <pre id="batch-preview" class="preview"></pre>
    </div>
  </aside>
</body>
</html>
