<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Catalogue AHPV — Carte interactive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Leaflet local to CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --bg:#f8f8f8; --fg:#222; --brand:#1474d4;}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--fg);background:var(--bg);}
    header{padding:.75rem 1rem;background:var(--brand);color:#fff;font-size:1.25rem;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:.5rem;box-shadow:0 4px 14px rgba(0,0,0,.12);}
    header img{height:32px;}
    #map{height:60vh;}
    #sidebar{height:40vh;overflow-y:auto;padding:1rem;background:#fff;box-shadow:inset 0 2px 4px rgba(0,0,0,.06);}
    .article{padding:.5rem .25rem;border-bottom:1px solid #e2e2e2;cursor:pointer;transition:background .15s;}
    .article:last-child{border-bottom:none;}
    .article:hover{background:#f1f7ff;}
    .article h4{margin:0;font-size:1rem;font-weight:600;color:var(--brand);}
    .article small{color:#666;}
    @media (min-width:900px){#map{height:calc(100vh - 65px);}#sidebar{position:absolute;top:65px;right:0;width:340px;height:calc(100vh - 65px);border-left:1px solid #ddd;z-index:1000;}}
  </style>
</head>
<body>
  <header>
    <img src="assets/logo_ahpv.png" alt="AHPV" />
    Catalogue des articles — Carte interactive
  </header>
  <main>
    <div id="map"></div>
    <aside id="sidebar"></aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.3/dist/papaparse.min.js"></script>
  <script>
    const CSV_PATH = "data/articles.csv";
    const COORDS_PATH = "data/villes_coords.json";

    const map = L.map("map", {
      center: [45.1, 5.7],
      zoom: 9,
      minZoom: 6,
      zoomControl: true,
    });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    const LOCAL_KEY = "ahpv_city_coords_v1";
    let cityCoords = JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}");

    async function ensureCoord(city) {
      if (cityCoords[city]) return cityCoords[city];
      const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
        encodeURIComponent(city + ", Isère, France");
      const res = await fetch(url, { headers: { "Accept-Language": "fr" } });
      const js = await res.json();
      if (js && js.length) {
        const { lat, lon } = js[0];
        cityCoords[city] = { lat: +lat, lon: +lon };
        localStorage.setItem(LOCAL_KEY, JSON.stringify(cityCoords));
        return cityCoords[city];
      }
      return null;
    }

    async function loadStaticCoords() {
      try {
        const res = await fetch(COORDS_PATH);
        if (res.ok) {
          const json = await res.json();
          cityCoords = { ...json, ...cityCoords };
        }
      } catch (_) {}
    }

    function createSidebarEntry(art, city) {
      const div = document.createElement("div");
      div.className = "article";
      div.innerHTML = "<h4>" + art.Titre + "</h4><small>" + city + " — " + (art['Année'] || 's.d.') + "</small>";
      return div;
    }

    async function placeMarker(art, city) {
      const coord = await ensureCoord(city);
      if (!coord) return;
      const marker = L.marker([coord.lat, coord.lon]).addTo(map);
      marker.bindPopup("<strong>" + art.Titre + "</strong><br/>" + city + "<br/>" + (art['Auteur(s)'] || '') + "<br/><em>" + (art['Année'] || 's.d.') + "</em>");
      marker.on("click", () => marker.openPopup());
      const entry = createSidebarEntry(art, city);
      entry.addEventListener("click", () => {
        map.setView([coord.lat, coord.lon], 12);
        marker.openPopup();
      });
      document.getElementById("sidebar").appendChild(entry);
    }

    async function loadArticles() {
      await loadStaticCoords();
      Papa.parse(CSV_PATH, {
        download: true,
        header: true,
        complete: async ({ data }) => {
          const articles = data.filter(r => r['Ville(s)']);
          for (const art of articles) {
            const firstCity = art['Ville(s)'].split(/[;,/]/)[0].trim();
            if (firstCity) await placeMarker(art, firstCity);
          }
        },
      });
    }

    loadArticles();
  </script>
</body>
</html>
