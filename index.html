<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Catalogue des Articles</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<h1>Catalogue des Articles</h1>

<!-- Panneau d'état GitHub -->
<div id="github-status" class="status-panel">
  <span id="status-auth" class="status-badge">Auth ❌</span>
  <span id="status-repo" class="status-badge">Repo ❌</span>
  <span id="status-branch" class="status-badge">Branch ❌</span>
  <span id="status-file" class="status-badge">Fichier ❌</span>
</div>

<!-- Boutons -->
<div class="controls">
  <button id="login-btn">🔐 Se connecter GitHub</button>
  <button id="logout-btn">🚪 Déconnexion</button>
  <button id="save-btn">💾 Enregistrer dans GitHub</button>
</div>

<!-- Formulaire d'ajout -->
<div id="form-container">
  <h2>Ajouter un article</h2>
  <input name="Année" placeholder="Année" list="dl-annee">
  <input name="Numéro" placeholder="Numéro" list="dl-numero">
  <input name="Titre" placeholder="Titre">
  <input name="Page(s)" placeholder="Pages">
  <input name="Auteur(s)" placeholder="Auteur(s)" list="dl-auteurs">
  <input name="Ville(s)" placeholder="Ville(s)" list="dl-villes">
  <input name="Theme(s)" placeholder="Thème(s)" list="dl-themes">
  <input name="Epoque" placeholder="Période" list="dl-epoques">
  <button id="save-in-drawer">Ajouter et enregistrer</button>
</div>

<!-- Datalists -->
<datalist id="dl-annee"></datalist>
<datalist id="dl-numero"></datalist>
<datalist id="dl-auteurs"></datalist>
<datalist id="dl-villes"></datalist>
<datalist id="dl-themes"></datalist>
<datalist id="dl-epoques"></datalist>

<!-- Filtres -->
<div class="filters">
  <label>Année :
    <select id="filter-annee"></select>
  </label>
  <label>Numéro :
    <select id="filter-numero"></select>
  </label>
  <label>Afficher :
    <select id="limit">
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="all">Tout</option>
    </select>
  </label>
  <label>Recherche :
    <input type="text" id="search" placeholder="Rechercher...">
  </label>
</div>

<!-- Tableau -->
<div id="articles"></div>

<script src="app.js"></script>
</body>
</html>
