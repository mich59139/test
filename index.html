<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalogue des Articles</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Catalogue des Articles</h1>

  <!-- Badges d'état -->
  <div class="badges">
    Auth: <span id="status-auth">❌</span>
    Repo: <span id="status-repo">❌</span>
    Branche: <span id="status-branch">❌</span>
    Fichier: <span id="status-file">❌</span>
    <span id="gh-msg" class="notice"></span>
  </div>

  <!-- Boutons -->
  <div class="controls">
   <button id="login-btn" onclick="window._login?.()">🔐 Se connecter GitHub</button>
<button id="logout-btn" onclick="window._logout?.()">🚪 Déconnexion</button>
<button id="save-btn"   onclick="window._save?.()">💾 Enregistrer dans GitHub</button>
<button id="init-btn"   onclick="window._init?.()">🧩 Créer data/articles.csv (si manquant)</button>
...
<button id="add-btn"    onclick="window._add?.()">Ajouter et enregistrer</button>
  </div>

  <!-- Formulaire d'ajout -->
  <div class="form-add">
    <h2>Ajouter un article</h2>
    <input type="text" id="add-annee"   placeholder="Année">
    <input type="text" id="add-numero"  placeholder="Numéro">
    <input type="text" id="add-titre"   placeholder="Titre">
    <input type="text" id="add-pages"   placeholder="Page(s)">
    <input type="text" id="add-auteurs" placeholder="Auteur(s)">
    <input type="text" id="add-villes"  placeholder="Ville(s)">
    <input type="text" id="add-themes"  placeholder="Thème(s)">
    <input type="text" id="add-epoque"  placeholder="Période">
    <button id="add-btn">Ajouter et enregistrer</button>
  </div>

  <!-- Filtres -->
  <div class="filters">
    <label>Afficher :
      <select id="limit">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="all">Tout</option>
      </select>
    </label>
    <label>Année :
      <select id="filter-annee"></select>
    </label>
    <label>Numéro :
      <select id="filter-numero"></select>
    </label>
    <label>Recherche :
      <input type="text" id="search" placeholder="Chercher dans tous les champs">
    </label>
  </div>

  <!-- Tableau -->
  <div id="articles">
    <table>
      <thead>
        <tr>
          <th data-col="Année">Année</th>
          <th data-col="Numéro">Numéro</th>
          <th data-col="Titre">Titre</th>
          <th data-col="Page(s)">Page(s)</th>
          <th data-col="Auteur(s)">Auteur(s)</th>
          <th data-col="Ville(s)">Ville(s)</th>
          <th data-col="Theme(s)">Thème(s)</th>
          <th data-col="Epoque">Période</th>
        </tr>
      </thead>
      <tbody id="articles-body"></tbody>
    </table>
    <div class="pager">
      <button id="prev">◀ Précédent</button>
      <span id="pageinfo"></span>
      <button id="next">Suivant ▶</button>
    </div>
  </div>

  <!-- Librairie CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- App -->
  <script src="app.js"></script>
</body>
</html>
