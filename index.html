<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue des articles — édition GitHub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1>Catalogue des articles — édition</h1>

  <div id="toolbar">
    <label>Année :
      <select id="filter-annee"><option value="">(toutes)</option></select>
    </label>
    <label>Numéro :
      <select id="filter-numero"><option value="">(tous)</option></select>
    </label>
    <label>Afficher :
      <select id="limit">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="all" selected>Tous</option>
      </select>
    </label>
    <input type="text" id="search" placeholder="Rechercher…" />
    <button id="toggle-add">➕ Ajouter</button>
    <button id="remove-selected">🗑️ Supprimer la sélection</button>
    <span id="count"></span>
  </div>

  <div id="authbar">
    <input type="password" id="gh-token" placeholder="Token GitHub (repo:contents)" />
    <button id="gh-login">Se connecter</button>
    <button id="gh-save" disabled>💾 Enregistrer dans GitHub</button>
    <span id="save-status"></span>
  </div>

  <!-- Drawer ajout -->
  <div id="drawer" class="drawer">
    <div class="drawer-content">
      <button id="close-drawer" title="Fermer">✖</button>
      <h2>Nouvel article</h2>
      <form id="form-article">
        <input name="Année"  placeholder="Année" required list="list-annee"/>
        <input name="Numéro" placeholder="Numéro" required list="list-numero"/>
        <input name="Titre"  placeholder="Titre" required />
        <input name="Page(s)" placeholder="Page(s)" />
        <input name="Auteur(s)" placeholder="Auteur(s)" list="list-auteurs"/>
        <input name="Ville(s)"  placeholder="Ville(s)" list="list-villes"/>
        <input name="Theme(s)" placeholder="Thème(s)" list="list-themes"/>
        <input name="Epoque"   placeholder="Période (Epoque)" list="list-epoques"/>
        <button type="submit">Ajouter</button>
      </form>
      <datalist id="list-annee"></datalist>
      <datalist id="list-numero"></datalist>
      <datalist id="list-auteurs"></datalist>
      <datalist id="list-villes"></datalist>
      <datalist id="list-themes"></datalist>
      <datalist id="list-epoques"></datalist>
      <hr/>
      <button id="export-view">⤓ Exporter la vue (.csv)</button>
    </div>
  </div>

  <div id="articles"></div>

  <script>
    const OWNER = "mich59139";
    const REPO = "test";
    const BRANCH = "main";
    const FILE_PATH = "data/articles.csv";
  </script>
  <script src="app.js" defer></script>
</body>
</html>
